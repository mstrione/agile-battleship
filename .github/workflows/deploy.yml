name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
            set net:timeout 15;
            set net:max-retries 3;
            open sftp://u70489319:$SFTP_PASSWORD@home433496742.1and1-data.host:22;
            mirror --reverse --delete --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .claude/ ./ /strione.com/agile-battleship;
            bye
          "
